name: Deployer

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test
    runs-on: ubuntu-latest
    environment: CI

    services:
      postgres:
        image: "bsamasi/postgis-pgvector:pg17@sha256:f3133925f641c093fae3f83607cfe21eb6e401b6961ae1cac84f70ff6f767f59"
        env:
          PGPASSWORD: postgres
          POSTGRES_DB: laravel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: 8.4.1
          tools: composer:v2
          coverage: xdebug

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node Dependencies
        run: npm ci

      - name: Add Wire Credentials Loaded From ENV
        run: composer config http-basic.wire-elements-pro.composer.sh ${{ secrets.WIRE_SECRET}}

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        id: tests
        run: |
          # Run PHPUnit with output capturing all test results
          # Use tee so we still see output in Actions logs
          ./vendor/bin/phpunit --teamcity | tee test_output.txt || true

          # Extract finished and failed test names
          grep "##teamcity\[testFinished" test_output.txt \
            | sed "s/.*name='\([^']*\)'.*/\1/" > all_finished.txt
          grep "##teamcity\[testFailed" test_output.txt \
            | sed "s/.*name='\([^']*\)'.*/\1/" | sort -u > failed_tests.txt

          # Compute passed = finished − failed
          sort -u all_finished.txt > all_finished_sorted.txt
          comm -23 all_finished_sorted.txt failed_tests.txt > passed_tests.txt

          # Derive counts from lists
          TOTAL=$(wc -l < all_finished_sorted.txt)
          FAILED=$(wc -l < failed_tests.txt)
          PASSED=$(wc -l < passed_tests.txt)

          # Clean up intermediate lists
          rm -f all_finished.txt all_finished_sorted.txt

          # Store test results for summary step
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

          # Exit with error if any tests failed
          if [ "${FAILED:-0}" -gt 0 ]; then
            exit 1
          fi

      - name: Add Test Results to Summary
        if: always()
        run: |
          echo "# Deployment Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build & Test Results" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.tests.outputs.failed }}" = "0" ]; then
            echo "- ✅ CI Tests Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ CI Tests Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- Total Tests: \`${{ steps.tests.outputs.total }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Passed: \`${{ steps.tests.outputs.passed }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Failed: \`${{ steps.tests.outputs.failed }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add passed tests in expandable section
          echo "<details><summary>✅ Passed Tests (${{ steps.tests.outputs.passed }})</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat passed_tests.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add failed tests in expandable section if any
          if [ "${{ steps.tests.outputs.failed }}" != "0" ]; then
            echo "<details><summary>❌ Failed Tests (${{ steps.tests.outputs.failed }})</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat failed_tests.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

  version:
    name: Version
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      hash: ${{ steps.get_hash.outputs.hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm clean-install
      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      - name: Get version
        id: get_version
        run: echo "version=$(cat VERSION.txt)" >> "$GITHUB_OUTPUT"
      - name: Get hash
        id: get_hash
        run: echo "hash=$(git rev-parse --short=6 HEAD)" >> "$GITHUB_OUTPUT"
      - name: Upload version artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: version
          path: VERSION.txt
      - name: Add Version Info to Summary
        run: |
          echo "- 📦 Version: \`$(cat VERSION.txt)\`" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 Commit: [\`$(git rev-parse --short=6 HEAD)\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/$(git rev-parse HEAD))" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: version
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    permissions:
      contents: write
    steps:
      - name: App Token
        id: app_token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: "8.4.1"

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Add Wire Credentials Loaded From ENV
        run: composer config http-basic.wire-elements-pro.composer.sh ${{ secrets.WIRE_SECRET}}

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Deploy
        uses: deployphp/action@a1b46c204dbde25a32ed0d7bb6751ac3377ca1e9 # v1
        env:
          DEPLOYER_USER: ${{ vars.DEPLOYER_USER }}
          DEPLOYER_HOSTNAME: ${{ vars.DEPLOYER_HOSTNAME }}
          DEPLOYER_PATH: ${{ vars.DEPLOYER_PATH }}
          DEPLOYER_APP: ${{ vars.DEPLOYER_APP }}
          DEPLPOYER_REPO: ${{ vars.DEPLOYER_REPO }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_TOKEN: ${{ secrets.SENTRY_TOKEN }}
          SENTRY_PREFIX: ${{ vars.SENTRY_PREFIX }}
          SENTRY_SERVER: ${{ vars.SENTRY_SERVER }}
          SENTRY_PROJECT_ARRAY: ${{ vars.SENTRY_PROJECT_ARRAY }}
          WIRE_SECRET: ${{ secrets.WIRE_SECRET }}
        with:
          private-key: ${{ secrets.PRIVATE_KEY }}
          dep: deploy prod

      - name: Get version
        if: github.ref == 'refs/heads/main' && needs.version.outputs.version != ''
        id: get_version
        run: |
          echo "version=$(cat VERSION.txt)" >> "$GITHUB_OUTPUT"
          php artisan version:absorb
          git add .

      - name: Commit Changes
        if: github.ref == 'refs/heads/main' && needs.version.outputs.version != ''
        id: auto_commit_action
        uses: dsanders11/github-app-commit-action@43de6da2f4d927e997c0784c7a0b61bd19ad6aac # v1
        with:
          message: ":pushpin: Update version"
          token: ${{ steps.app_token.outputs.token }}
          fail-on-no-changes: false

      - name: Add Deployment Info to Summary
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Environment: Production" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 URL: https://${{ vars.DEPLOYER_HOSTNAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: version
    if: github.ref == 'refs/heads/dev'
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    permissions:
      contents: write
    steps:
      - name: App Token
        id: app_token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: "8.4.1"

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Add Wire Credentials Loaded From ENV
        run: composer config http-basic.wire-elements-pro.composer.sh ${{ secrets.WIRE_SECRET}}

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Deploy
        uses: deployphp/action@a1b46c204dbde25a32ed0d7bb6751ac3377ca1e9 # v1
        env:
          DEPLOYER_USER: ${{ vars.DEV_DEPLOYER_USER }}
          DEPLOYER_HOSTNAME: ${{ vars.DEV_DEPLOYER_HOSTNAME }}
          DEPLOYER_PATH: ${{ vars.DEV_DEPLOYER_PATH }}
          DEPLOYER_APP: ${{ vars.DEV_DEPLOYER_APP }}
          DEPLPOYER_REPO: ${{ vars.DEPLOYER_REPO }}
          WIRE_SECRET: ${{ secrets.WIRE_SECRET }}
        with:
          private-key: ${{ secrets.PRIVATE_KEY }}
          dep: deploy dev

      - name: Get version
        if: github.ref == 'refs/heads/dev' && needs.version.outputs.version != ''
        id: get_version
        run: |
          echo "version=$(cat VERSION.txt)" >> "$GITHUB_OUTPUT"
          php artisan version:absorb
          git add .

      - name: Commit Changes
        if: github.ref == 'refs/heads/main'
        id: auto_commit_action
        uses: dsanders11/github-app-commit-action@43de6da2f4d927e997c0784c7a0b61bd19ad6aac # v1
        with:
          message: ":pushpin: Update version"
          token: ${{ steps.app_token.outputs.token }}
          fail-on-no-changes: false

      - name: Add Deployment Info to Summary
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Environment: Development" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 URL: https://${{ vars.DEV_DEPLOYER_HOSTNAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - deploy-prod
      - version
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Create Sentry release
        uses: getsentry/action-release@5657c9e888b4e2cc85f4d29143ea4131fde4a73a # v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_URL: ${{ vars.SENTRY_SERVER }}
        with:
          environment: production
          release: ${{ needs.deploy-prod.outputs.version }}
          release_prefix: ${{ vars.SENTRY_PREFIX }}
          projects: ${{ vars.SENTRY_PROJECT_ARRAY }}
          disable_telemetry: true
          ignore_missing: true
      - name: Add Monitoring Info to Summary
        run: |
          echo "## Monitoring" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 [Sentry Release](${{ vars.SENTRY_SERVER }}/organizations/${{ vars.SENTRY_ORG }}/releases/${{ vars.SENTRY_PREFIX }}@${{ needs.deploy-prod.outputs.version }}/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
      - name: Add Related Changes to Summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Related Changes" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Requests" >> $GITHUB_STEP_SUMMARY
          gh pr list --search "${{ needs.version.outputs.hash }}" --json number,title,url --jq '.[] | "- [#\(.number) \(.title)](\(.url))"' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Issues" >> $GITHUB_STEP_SUMMARY
          gh issue list --search "${{ needs.version.outputs.hash }}" --json number,title,url --jq '.[] | "- [#\(.number) \(.title)](\(.url))"' >> $GITHUB_STEP_SUMMARY

  release-dev:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    needs:
      - deploy-dev
      - version
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Create Sentry release
        uses: getsentry/action-release@5657c9e888b4e2cc85f4d29143ea4131fde4a73a # v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_URL: ${{ vars.SENTRY_SERVER }}
        with:
          environment: dev
          release: ${{ needs.deploy-dev.outputs.version }}
          release_prefix: ${{ vars.SENTRY_PREFIX }}
          projects: ${{ vars.SENTRY_PROJECT_ARRAY }}
          disable_telemetry: true
          ignore_missing: true
      - name: Add Monitoring Info to Summary
        run: |
          echo "## Monitoring" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 [Sentry Release](${{ vars.SENTRY_SERVER }}/organizations/${{ vars.SENTRY_ORG }}/releases/${{ vars.SENTRY_PREFIX }}@${{ needs.deploy-dev.outputs.version }}/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
      - name: Add Related Changes to Summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Related Changes" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Requests" >> $GITHUB_STEP_SUMMARY
          gh pr list --search "${{ needs.version.outputs.hash }}" --json number,title,url --jq '.[] | "- [#\(.number) \(.title)](\(.url))"' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Issues" >> $GITHUB_STEP_SUMMARY
          gh issue list --search "${{ needs.version.outputs.hash }}" --json number,title,url --jq '.[] | "- [#\(.number) \(.title)](\(.url))"' >> $GITHUB_STEP_SUMMARY

  sync-branch:
    name: Sync
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - deploy-prod
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      - name: App Token
        id: app_token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Sync Branch
        uses: remarkablemark/sync-branch@272cff15a71b5961217ab38ff110692668ff0242 # v1
        with:
          base: dev
          title: ":twisted_rightwards_arrows: Sync back to dev"
          token: ${{ steps.app_token.outputs.token }}
          admin: true
          body: |
            This PR is automatically created to sync the main branch back to dev after a production deployment.
