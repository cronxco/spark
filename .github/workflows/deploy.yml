name: Deployer

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test
    runs-on: ubuntu-latest
    environment: CI

    services:
      postgres:
        image: "pgvector/pgvector:0.8.1-pg17@sha256:1a5ea285a159bed991c74a9c4751b6eadc536b3c3263f3f95ec3865885a62b69"
        env:
          PGPASSWORD: postgres
          POSTGRES_DB: laravel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: Composer Install with Cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Add Wire Credentials
        run: composer config http-basic.wire-elements-pro.composer.sh ${{ secrets.WIRE_SECRET }}

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        id: tests
        run: |
          ./vendor/bin/phpunit --teamcity | tee test_output.txt || true
          grep "##teamcity\[testFinished" test_output.txt | sed "s/.*name='\([^']*\)'.*/\1/" > all_finished.txt
          grep "##teamcity\[testFailed" test_output.txt | sed "s/.*name='\([^']*\)'.*/\1/" | sort -u > failed_tests.txt
          sort -u all_finished.txt > all_finished_sorted.txt
          comm -23 all_finished_sorted.txt failed_tests.txt > passed_tests.txt
          TOTAL=$(wc -l < all_finished_sorted.txt)
          FAILED=$(wc -l < failed_tests.txt)
          PASSED=$(wc -l < passed_tests.txt)
          rm -f all_finished.txt all_finished_sorted.txt
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          if [ "${FAILED:-0}" -gt 0 ]; then exit 1; fi

      - name: Add Test Results to Summary
        if: always()
        run: |
          echo "# Deployment Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "## Build & Test Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tests.outputs.failed }}" = "0" ]; then
            echo "- ✅ CI Tests Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ CI Tests Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "### Test Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- Total: \`${{ steps.tests.outputs.total }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Passed: \`${{ steps.tests.outputs.passed }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Failed: \`${{ steps.tests.outputs.failed }}\`" >> $GITHUB_STEP_SUMMARY

  version:
    name: Version
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      hash: ${{ steps.get_hash.outputs.hash }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: Verify npm Integrity
        run: npm audit signatures

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Get Version
        id: get_version
        run: echo "version=$(cat VERSION.txt)" >> "$GITHUB_OUTPUT"

      - name: Get Commit Hash
        id: get_hash
        run: echo "hash=$(git rev-parse --short=6 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload Version Artifact
        uses: actions/upload-artifact@v4
        with:
          name: version
          path: VERSION.txt

      - name: Add Version Info to Summary
        run: |
          echo "- 📦 Version: \`$(cat VERSION.txt)\`" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 Commit: [\`$(git rev-parse --short=6 HEAD)\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/$(git rev-parse HEAD))" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: [version]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup PHP & Node
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Add Wire Credentials
        run: composer config http-basic.wire-elements-pro.composer.sh ${{ secrets.WIRE_SECRET }}

      - name: Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci
          npm run build

      - name: Deploy to Production
        uses: deployphp/action@v1
        env:
          DEPLOYER_USER: ${{ vars.DEPLOYER_USER }}
          DEPLOYER_HOSTNAME: ${{ vars.DEPLOYER_HOSTNAME }}
          DEPLOYER_PATH: ${{ vars.DEPLOYER_PATH }}
          DEPLOYER_APP: ${{ vars.DEPLOYER_APP }}
          DEPLPOYER_REPO: ${{ vars.DEPLOYER_REPO }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_TOKEN: ${{ secrets.SENTRY_TOKEN }}
          SENTRY_PREFIX: ${{ vars.SENTRY_PREFIX }}
          SENTRY_SERVER: ${{ vars.SENTRY_SERVER }}
          SENTRY_PROJECT_ARRAY: ${{ vars.SENTRY_PROJECT_ARRAY }}
          WIRE_SECRET: ${{ secrets.WIRE_SECRET }}
        with:
          private-key: ${{ secrets.PRIVATE_KEY }}
          dep: deploy prod

      - name: Version Updates
        run: |
          echo "version=$(cat VERSION.txt)" >> "$GITHUB_OUTPUT"
          php artisan version:absorb
          git add .
          git commit -m ":pushpin: Update version" || echo "No changes to commit"

      - name: Add Deployment Info to Summary
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Environment: Production" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 URL: https://${{ vars.DEPLOYER_HOSTNAME }}" >> $GITHUB_STEP_SUMMARY

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [version]
    if: github.ref == 'refs/heads/dev'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup PHP & Node
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Add Wire Credentials
        run: composer config http-basic.wire-elements-pro.composer.sh ${{ secrets.WIRE_SECRET }}

      - name: Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci
          npm run build

      - name: Deploy to Dev
        uses: deployphp/action@v1
        env:
          DEPLOYER_USER: ${{ vars.DEV_DEPLOYER_USER }}
          DEPLOYER_HOSTNAME: ${{ vars.DEV_DEPLOYER_HOSTNAME }}
          DEPLOYER_PATH: ${{ vars.DEV_DEPLOYER_PATH }}
          DEPLOYER_APP: ${{ vars.DEV_DEPLOYER_APP }}
          DEPLPOYER_REPO: ${{ vars.DEPLPOYER_REPO }}
          WIRE_SECRET: ${{ secrets.WIRE_SECRET }}
        with:
          private-key: ${{ secrets.PRIVATE_KEY }}
          dep: deploy dev

      - name: Version Updates
        run: |
          echo "version=$(cat VERSION.txt)" >> "$GITHUB_OUTPUT"
          php artisan version:absorb
          git add .
          git commit -m ":pushpin: Update version" || echo "No changes to commit"

      - name: Add Deployment Info to Summary
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Environment: Development" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 URL: https://${{ vars.DEV_DEPLOYER_HOSTNAME }}" >> $GITHUB_STEP_SUMMARY
