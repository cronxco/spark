name: Close issues on dev
on:
  push:
    branches:
      - dev

permissions:
  issues: write
  contents: read

jobs:
  close-issues-on-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Collect commit messages from this push
        id: commits
        run: |
          echo "messages<<EOF" >> $GITHUB_OUTPUT
          git log ${{ github.event.before }}..${{ github.sha }} --pretty=format:"%s%n%b" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract issue numbers from commit messages
        id: extract
        run: |
          matches=$(echo "${{ steps.commits.outputs.messages }}" | grep -Eio '(fixes|closes|resolves)[[:space:]]+#([0-9]+)' | grep -Eo '[0-9]+' | sort -u || true)
          echo "issues=$matches" >> $GITHUB_OUTPUT

      - name: Close dev-labelled issues
        if: ${{ steps.extract.outputs.issues != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for issue_number in ${{ steps.extract.outputs.issues }}; do
            echo "🔍 Checking issue #$issue_number..."

            # Get labels for the issue
            labels=$(gh issue view "$issue_number" --json labels --jq '.labels[].name')
            if echo "$labels" | grep -qi '^dev$'; then
              echo "✅ Issue #$issue_number has 'dev' label — closing."
              gh issue close "$issue_number" --comment "Closed automatically after merge into 'dev'."
            else
              echo "⏭️  Issue #$issue_number does not have 'dev' label — skipping."
            fi
          done
