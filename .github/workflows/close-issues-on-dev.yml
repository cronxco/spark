name: Close issues on dev
on:
  push:
    branches:
      - dev

permissions:
  issues: write
  contents: read

jobs:
  close-issues-on-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository (with full history)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0 # ✅ Required so git can see both commits in the range

      - name: Collect commit messages from this push
        id: commits
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          # Handle first push or missing history gracefully
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "ℹ️  First push detected — collecting all commits on branch."
            commits=$(git log --pretty=format:"%s%n%b")
          else
            echo "ℹ️  Collecting commits between $BEFORE_SHA and $AFTER_SHA."
            # Use || true to avoid exit on range errors (e.g. rebases, force pushes)
            commits=$(git log "$BEFORE_SHA".."$AFTER_SHA" --pretty=format:"%s%n%b" || true)
          fi

          delimiter="$(openssl rand -hex 8)"
          {
            echo "messages<<${delimiter}"
            echo "${commits}"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Extract issue numbers from commit messages
        id: extract
        run: |
          issues=$(echo "${{ steps.commits.outputs.messages }}" | grep -Eio '(fixes|closes|resolves)[[:space:]]+#([0-9]+)' | grep -Eo '[0-9]+' | sort -u || true)
          echo "issues=$issues" >> "$GITHUB_OUTPUT"

      - name: Close dev-labelled issues
        if: ${{ steps.extract.outputs.issues != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for issue_number in ${{ steps.extract.outputs.issues }}; do
            echo "🔍 Checking issue #$issue_number..."
            labels=$(gh issue view "$issue_number" --json labels --jq '.labels[].name' || echo "")
            if echo "$labels" | grep -qi '^dev$'; then
              echo "✅ Issue #$issue_number has 'dev' label — closing."
              gh issue close "$issue_number" --comment "Closed automatically after merge into 'dev'."
            else
              echo "⏭️  Issue #$issue_number does not have 'dev' label — skipping."
            fi
          done
