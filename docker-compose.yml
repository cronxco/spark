services:
    nginx:
        image: "nginx:latest@sha256:ca871a86d45a3ec6864dc45f014b11fe626145569ef0e74deaffc95a3b15b430"
        ports:
            - "${HTTP_PORT:-8000}:80"
            - "${SSL_PORT:-443}:443"
        environment:
            - SSL_PORT=${SSL_PORT:-443}
            - APP_SERVICE=${APP_SERVICE:-laravel.test}
            - SERVER_NAME=${SERVER_NAME:-localhost}
            - SSL_DOMAIN=${SSL_DOMAIN:-localhost}
            - SSL_ALT_NAME=${SSL_ALT_NAME:-DNS:localhost}
        volumes:
            - "sail-nginx:/etc/nginx/certs"
            - "./vendor/ryoluo/sail-ssl/nginx/templates:/etc/nginx/templates"
            - "./vendor/ryoluo/sail-ssl/nginx/generate-ssl-cert.sh:/docker-entrypoint.d/99-generate-ssl-cert.sh"
        depends_on:
            - ${APP_SERVICE:-laravel.test}
        networks:
            - sail
    laravel.test:
        build:
            context: ./vendor/laravel/sail/runtimes/8.4
            dockerfile: Dockerfile
            args:
                WWWGROUP: "${WWWGROUP}"
        image: sail-8.4/app
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "${APP_PORT:-80}:80"
            - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
        environment:
            WWWUSER: "${WWWUSER}"
            LARAVEL_SAIL: 1
            XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-off}"
            XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}"
            IGNITION_LOCAL_SITES_PATH: "${PWD}"
        volumes:
            - ".:/var/www/html"
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
    pgsql:
        image: "bsamasi/postgis-pgvector:pg17@sha256:f3133925f641c093fae3f83607cfe21eb6e401b6961ae1cac84f70ff6f767f59"
        ports:
            - "${FORWARD_DB_PORT:-5432}:5432"
        environment:
            PGPASSWORD: "${DB_PASSWORD:-secret}"
            POSTGRES_DB: "${DB_DATABASE}"
            POSTGRES_USER: "${DB_USERNAME}"
            POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
        volumes:
            - "sail-pgsql:/var/lib/postgresql/data"
            - "./vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql"
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - "-q"
                - "-d"
                - "${DB_DATABASE}"
                - "-U"
                - "${DB_USERNAME}"
            retries: 3
            timeout: 5s
    redis:
        image: "redis:alpine@sha256:6cbef353e480a8a6e7f10ec545f13d7d3fa85a212cdcc5ffaf5a1c818b9d3798"
        ports:
            - "${FORWARD_REDIS_PORT:-6379}:6379"
        volumes:
            - "sail-redis:/data"
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    chrome:
        image: "maelp/docker-vnc-chromium:latest@sha256:0fb0477d22a1bad5141084661bcd479c5a37543fb7c01f4570d1d3dcf6d1ece4"
        ports:
            - "${CHROME_VNC_PORT:-5900}:5900"
            - "${CHROME_CDP_PORT:-9222}:9222"
        environment:
            - VNC_PASSWORD=${CHROME_VNC_PASSWORD:-spark-dev-vnc}
            - DISPLAY_WIDTH=1920
            - DISPLAY_HEIGHT=1080
            - CHROME_EXTRA_ARGS=--remote-debugging-address=0.0.0.0
        volumes:
            - "chrome-userdata:/config/userdata"
        networks:
            sail:
                ipv4_address: 172.20.0.10
        healthcheck:
            test:
                - CMD
                - curl
                - "-f"
                - "http://localhost:9222/json/version"
            interval: 10s
            timeout: 5s
            retries: 3
        profiles:
            - playwright
    playwright-worker:
        build:
            context: ./docker/playwright
            dockerfile: Dockerfile
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            - CHROME_CDP_URL=http://172.20.0.10:9222
            - NODE_ENV=production
            - STEALTH_ENABLED=${PLAYWRIGHT_STEALTH_ENABLED:-true}
            - CONTEXT_TTL=${PLAYWRIGHT_CONTEXT_TTL:-1800000}
        ports:
            - "${PLAYWRIGHT_WORKER_PORT:-3000}:3000"
        volumes:
            - "./storage/app/playwright:/app/storage:rw"
        networks:
            - sail
        depends_on:
            chrome:
                condition: service_healthy
        healthcheck:
            test:
                - CMD
                - wget
                - "--quiet"
                - "--tries=1"
                - "--spider"
                - "http://localhost:3000/health"
            interval: 10s
            timeout: 5s
            retries: 3
        profiles:
            - playwright
networks:
    sail:
        driver: bridge
        ipam:
            config:
                - subnet: 172.20.0.0/16
volumes:
    sail-nginx:
        driver: local
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    chrome-userdata:
        driver: local
